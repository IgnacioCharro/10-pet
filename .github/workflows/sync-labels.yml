name: Sync labels

# Sincroniza los labels definidos en .github/labels.yml con los del repo.
# Se dispara al modificar el archivo o manualmente desde Actions.

on:
  push:
    branches: [main]
    paths:
      - .github/labels.yml
      - .github/workflows/sync-labels.yml
  workflow_dispatch:

jobs:
  sync:
    name: Sync labels from labels.yml
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync labels
        uses: EndBug/label-sync@v2
        with:
          config-file: .github/labels.yml
          # No borra labels creados manualmente que no estén en labels.yml.
          # Cambiar a true si querés que labels.yml sea la única fuente de verdad.
          delete-other-labels: false
